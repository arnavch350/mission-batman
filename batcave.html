
<html>
<head>
<title>Batcave</title>

<style>
body{
    margin:0;
    height:100vh;
    background:radial-gradient(circle,#1b263b,#000);
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

.container{
    padding-top:80px;
}

h1{
    font-size:50px;
    color:#ffd700;
    text-shadow:0 0 20px #ffd700;
}

p{
    font-size:22px;
    width:70%;
    margin:auto;
    line-height:1.6;
}

.bat{
    font-size:100px;
    animation:float 2s infinite alternate;
}

button{
    margin-top:40px;
    padding:15px 35px;
    font-size:20px;
    background:#ffd700;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

button:hover{
    background:white;
    transform:scale(1.1);
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-20px);
    }
}
</style>

</head>

</html>
