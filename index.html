<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Batman</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
background:linear-gradient(#000814,#001d3d,#000);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.container{
text-align:center;
animation:fade 2s;
}

h1{
font-size:65px;
color:#00bfff;
text-shadow:0 0 20px #00bfff;
margin-bottom:20px;
}

p{
font-size:22px;
line-height:1.7;
margin-bottom:35px;
}

button{
padding:18px 45px;
font-size:20px;
border:none;
border-radius:50px;
background:#00bfff;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 30px #00bfff;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">

<h1>🦇 HAPPY BIRTHDAY MY BATMAN 😭✨</h1>

<p>
Welcome Batman...
<br><br>
This message was created by someone
who loves you more than words.💗✨
<br><br>
Ready to begin?🌚💋
</p>

<p class="music-note">
🎧 Before starting this mission...
<br><br>
Batman, wear your headphones first.
<br>
This story is meant to be experienced with one special song. ❤️
</p>

<button onclick="window.open('https://www.youtube.com/watch?v=QIQSQWvt4-M','_blank')">
🎵 START THE MUSIC
</button>

<br><br>

<button onclick="window.location.href='batcave.html'">
🦇 ENTER THE BATCAVE 🦇
</button>

</div>

</body>
</html>
